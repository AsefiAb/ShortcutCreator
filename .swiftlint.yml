disabled_rules:
  - trailing_whitespace
  - todo
  - line_length
  - type_body_length
  - file_length
  - identifier_name
  - cyclomatic_complexity
  - function_body_length
  - large_tuple

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - sorted_first_last
  - convenience_type
  - closure_spacing
  - redundant_nil_coalescing
  - operator_usage_whitespace
  - unused_optional_binding

excluded:
  - .build
  - DerivedData
  - "**/*.xcodeproj"

reporter: "xcode"
