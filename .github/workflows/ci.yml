name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: Build iOS
    runs-on: macos-15
    timeout-minutes: 25
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/Cellar
            /opt/homebrew/Cellar
          key: ${{ runner.os }}-brew-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build iOS app
        run: |
          set -o pipefail
          xcodebuild \
            -project ShortcutGenius.xcodeproj \
            -scheme "ShortcutGenius (iOS)" \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build | xcpretty

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild \
            -project ShortcutGenius.xcodeproj \
            -scheme "ShortcutGenius (iOS)" \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            test | xcpretty

  build-macos:
    name: Build macOS
    runs-on: macos-15
    timeout-minutes: 25
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build macOS app
        run: |
          set -o pipefail
          xcodebuild \
            -project ShortcutGenius.xcodeproj \
            -scheme "ShortcutGenius (macOS)" \
            -destination "generic/platform=macOS" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build | xcpretty
